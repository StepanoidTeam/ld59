name: Deploy to itch.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish to itch.io
        uses: addy72/butler-publish-action@v1
        with:
          # Твой API ключ из секретов GitHub
          itch_api_key: ${{ secrets.BUTLER_API_KEY }}
          # Путь к папке (у тебя это demo-lighthouse)
          itch_game_path: ./demo-lighthouse
          # Твой логин/название-игры
          itch_target: nuclme/lighthouse
          # Канал (для веба)
          itch_channel: web