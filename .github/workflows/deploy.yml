name: Deploy to itch.io

on:
  push:
    branches:
      - main  # Если у тебя ветка master, замени на master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to itch.io
        uses: manleyjster/action-itch@v1.1.0
        with:
          # Твой API ключ из секретов
          api_key: ${{ secrets.BUTLER_API_KEY }}
          # Твой логин и слаг игры
          game: nuclme/lighthouse
          # Канал (для HTML5 ставим web)
          channel: web
          # Путь к папке с файлами (индекс, цсс, джс)
          directory: ./demo-lighthouse