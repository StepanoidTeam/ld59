<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Станция перехвата</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
      }
      #game-root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module">
      /* Один файл-бандл: esm.sh мог подгружать pixi дважды → "batcher already has a handler" */
      import {
        Application,
        Container,
        Graphics,
        Sprite,
        Texture,
        Text,
      } from 'https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.mjs';

      const SYMBOLS = ['△', '◯', '⬡', '⬢', '⬤', '⬟'];
      const FREQS = ['low', 'mid', 'high', 'distorted'];
      const GAME_MS = 5 * 60 * 1000;
      const SIGNAL_WINDOW_MS = 15000;
      const BETWEEN_MIN_MS = 10000;
      const BETWEEN_MAX_MS = 15000;
      const FAKE_CHANCE = 0.3;

      /** Положите PNG рядом с index.html */
      const ASSET_BG = './background_operator.png';
      const ASSET_FRAME = './monitor_frame.png';
      const ASSET_RECEIVING = './receiving.png';
      const ASSET_RADAR = './radar.png';
      const ASSET_NOISE = './noise.png';

      /** Доля рамки текстуры монитора (подстройте под свой monitor_frame.png) */
      const MONITOR_BEZEL_X = 0.09;
      const MONITOR_BEZEL_Y = 0.11;

      /**
       * Обход ограничения fetch при некоторых сценариях (например, старые ошибки CORS).
       * Важно: при открытии страницы как file:// текстуры всё равно нельзя передать в WebGL
       * («tainted») — нужен http(s), см. проверку в main().
       */
      function loadTextureFromUrl(url) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.decoding = 'async';
          image.onload = async () => {
            try {
              if (image.decode) await image.decode();
              resolve(Texture.from(image));
            } catch (e) {
              reject(e);
            }
          };
          image.onerror = () =>
            reject(new Error(`Не удалось загрузить: ${url}`));
          image.src = url;
        });
      }

      function showFileProtocolNotice(rootEl) {
        rootEl.innerHTML = `
          <div style="max-width:520px;padding:28px 32px;font-family:Segoe UI,system-ui,sans-serif;color:#e6edf3;line-height:1.55;">
            <h1 style="margin:0 0 12px;font-size:20px;font-weight:600;">Нужен локальный сервер</h1>
            <p style="margin:0 0 16px;color:#8b949e;font-size:15px;">
              Страница открыта как <code style="color:#58a6ff;">file://</code>. Браузер помечает локальные PNG как «испорченные» (tainted)
              и запрещает загрузку их в WebGL — поэтому Pixi падает с <code style="color:#f85149;">texImage2D / tainted</code>.
              Это не ошибка игры; так устроена безопасность в Chrome/Edge/Firefox.
            </p>
            <p style="margin:0 0 10px;font-size:15px;">Откройте игру через HTTP, например в PowerShell из папки <code style="color:#79c0ff;">demo-salt</code>:</p>
            <pre style="margin:0 0 18px;padding:14px 16px;background:#161b22;border:1px solid #30363d;border-radius:8px;font-size:13px;overflow:auto;color:#e6edf3;">python -m http.server 8765</pre>
            <p style="margin:0 0 8px;font-size:15px;">Затем в браузере:</p>
            <pre style="margin:0;padding:14px 16px;background:#161b22;border:1px solid #30363d;border-radius:8px;font-size:13px;color:#3fb950;">http://localhost:8765/</pre>
            <p style="margin:16px 0 0;font-size:14px;color:#8b949e;">Альтернатива: <code style="color:#79c0ff;">npx --yes serve -l 8765</code></p>
          </div>`;
      }

      function randInt(min, max) {
        return min + Math.floor(Math.random() * (max - min + 1));
      }

      function randomBinary(len) {
        let s = '';
        for (let i = 0; i < len; i++) s += Math.random() < 0.5 ? '0' : '1';
        return s;
      }

      function betweenGapMs() {
        return randInt(BETWEEN_MIN_MS, BETWEEN_MAX_MS);
      }

      /** @returns {{ isFake: boolean, truthType: 'normal'|'warning', symbol: string, binary: string, freq: string, displayType: 'normal'|'warning', glitchNote: string }} */
      function generateSignal() {
        const isFake = Math.random() < FAKE_CHANCE;
        const truthType = Math.random() < 0.5 ? 'normal' : 'warning';
        const symbol = SYMBOLS[randInt(0, SYMBOLS.length - 1)];
        let binary = randomBinary(randInt(5, 7));
        let freq = FREQS[randInt(0, FREQS.length - 1)];
        let displayType = truthType;
        let glitchNote = '';

        if (isFake) {
          const flaw = randInt(0, 3);
          if (flaw === 0) {
            binary += Math.random() < 0.5 ? 'x' : '?';
            glitchNote = 'битовая ошибка';
          } else if (flaw === 1) {
            freq = freq + '/' + FREQS[randInt(0, FREQS.length - 1)];
            glitchNote = 'конфликт частоты';
          } else if (flaw === 2) {
            displayType = truthType === 'normal' ? 'warning' : 'normal';
            glitchNote = 'несовпадение типа';
          } else {
            glitchNote = 'CRC fail';
          }
        }

        return {
          isFake,
          truthType,
          symbol,
          binary,
          freq,
          displayType,
          glitchNote,
        };
      }

      function resolveAction(signal, choice) {
        // choice: 'report' | 'calm'
        if (signal.isFake) return { ok: true };

        if (signal.truthType === 'warning' && choice === 'calm')
          return { ok: false };
        if (signal.truthType === 'normal' && choice === 'report')
          return { ok: false };
        return { ok: true };
      }

      async function main() {
        const root = document.getElementById('game-root');
        if (location.protocol === 'file:') {
          showFileProtocolNotice(root);
          return;
        }

        const W = Math.min(920, window.innerWidth);
        const H = Math.min(640, window.innerHeight);

        const app = new Application();
        await app.init({
          width: W,
          height: H,
          background: 0x0d1117,
          antialias: true,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true,
        });
        root.appendChild(app.canvas);

        const [texBg, texFrame, texRecv, texRadar, texNoise] = await Promise.all([
          loadTextureFromUrl(ASSET_BG),
          loadTextureFromUrl(ASSET_FRAME),
          loadTextureFromUrl(ASSET_RECEIVING),
          loadTextureFromUrl(ASSET_RADAR),
          loadTextureFromUrl(ASSET_NOISE),
        ]);

        const bgSpr = Sprite.from(texBg);
        bgSpr.anchor.set(0.5);
        bgSpr.eventMode = 'none';

        const frameSpr = Sprite.from(texFrame);
        frameSpr.anchor.set(0.5);
        frameSpr.eventMode = 'none';

        const recvSpr = Sprite.from(texRecv);
        recvSpr.anchor.set(0, 0);
        recvSpr.eventMode = 'none';
        recvSpr.visible = false;

        const radarSpr = Sprite.from(texRadar);
        radarSpr.eventMode = 'none';

        const noiseSpr = Sprite.from(texNoise);
        noiseSpr.eventMode = 'none';
        noiseSpr.alpha = 0.15;

        const tw = texFrame.width;
        const th = texFrame.height;
        const innerTW = tw * (1 - 2 * MONITOR_BEZEL_X);
        const innerTH = th * (1 - 2 * MONITOR_BEZEL_Y);

        const maxFrameW = W * 0.94;
        const maxFrameH = H * 0.94;
        const frameSc = Math.min(maxFrameW / tw, maxFrameH / th);

        frameSpr.scale.set(frameSc);
        frameSpr.position.set(W / 2, H / 2);

        const fw = tw * frameSc;
        const fh = th * frameSc;
        const ix0 = W / 2 - fw / 2 + MONITOR_BEZEL_X * tw * frameSc;
        const iy0 = H / 2 - fh / 2 + MONITOR_BEZEL_Y * th * frameSc;
        const isw = innerTW * frameSc;
        const ish = innerTH * frameSc;

        const bgSc = Math.max(W / texBg.width, H / texBg.height);
        bgSpr.scale.set(bgSc);
        bgSpr.position.set(W / 2, H / 2);

        const uiScale = Math.min(isw / W, ish / H);
        const monitorUi = new Container();
        monitorUi.scale.set(uiScale);
        monitorUi.position.set(
          ix0 + (isw - W * uiScale) / 2,
          iy0 + (ish - H * uiScale) / 2,
        );

        noiseSpr.position.set(ix0, iy0);
        noiseSpr.width = isw;
        noiseSpr.height = ish;

        const recvMaxW = Math.min(fw * 0.38, isw * 0.52);
        recvSpr.scale.set(recvMaxW / texRecv.width);
        recvSpr.position.set(W / 2 - fw / 2 + 12, H / 2 - fh / 2 + 10);

        const radarMax = Math.min(120, W * 0.2);
        radarSpr.anchor.set(1, 0);
        radarSpr.scale.set(radarMax / texRadar.width);
        radarSpr.position.set(W - 10, 10);

        const pad = 24;
        const title = new Text({
          text: 'Станция перехвата — оператор',
          style: {
            fill: 0xe6edf3,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 22,
            fontWeight: '600',
          },
        });
        title.x = pad;
        title.y = pad;

        const gameClock = new Text({
          text: '',
          style: {
            fill: 0x8b949e,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 16,
          },
        });
        gameClock.anchor.set(1, 0);
        gameClock.x = W - pad;
        gameClock.y = pad;

        const waitingText = new Text({
          text: 'Ожидание сигнала…',
          style: {
            fill: 0x58a6ff,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 28,
            align: 'center',
          },
        });
        waitingText.anchor.set(0.5, 0.5);
        waitingText.x = W / 2;
        waitingText.y = H * 0.38;

        const signalPanel = new Container();
        signalPanel.x = pad;
        signalPanel.y = 110;

        const panelBg = new Graphics();
        panelBg.roundRect(0, 0, W - pad * 2, 220, 12);
        panelBg.fill({ color: 0x161b22, alpha: 1 });
        panelBg.stroke({ width: 1, color: 0x30363d });

        const signalLines = [];
        const lineStyle = {
          fill: 0xe6edf3,
          fontFamily: 'Consolas, "Courier New", monospace',
          fontSize: 18,
          lineHeight: 26,
        };
        for (let i = 0; i < 6; i++) {
          const t = new Text({ text: '', style: lineStyle });
          t.x = 20;
          t.y = 16 + i * 28;
          signalLines.push(t);
          signalPanel.addChild(t);
        }

        signalPanel.addChildAt(panelBg, 0);
        signalPanel.visible = false;

        const decisionLabel = new Text({
          text: 'Решение (15 с):',
          style: {
            fill: 0x8b949e,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 14,
          },
        });
        decisionLabel.x = pad;
        decisionLabel.y = H - 130;

        const countdown = new Text({
          text: '',
          style: {
            fill: 0xf85149,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 20,
            fontWeight: '600',
          },
        });
        countdown.x = pad + 160;
        countdown.y = H - 135;

        const errorsText = new Text({
          text: 'Ошибок: 0',
          style: {
            fill: 0xf0883e,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 16,
          },
        });
        errorsText.x = W - pad;
        errorsText.anchor.set(1, 0);
        errorsText.y = H - 132;

        function makeButton(label, x, y, width, height, fill) {
          const c = new Container();
          c.x = x;
          c.y = y;

          const g = new Graphics();
          g.roundRect(0, 0, width, height, 8);
          g.fill({ color: fill, alpha: 1 });
          g.stroke({ width: 1, color: 0x30363d });

          const txt = new Text({
            text: label,
            style: {
              fill: 0xf0f6fc,
              fontFamily: 'Segoe UI, system-ui, sans-serif',
              fontSize: 16,
              fontWeight: '600',
              align: 'center',
            },
          });
          txt.anchor.set(0.5, 0.5);
          txt.x = width / 2;
          txt.y = height / 2;

          c.addChild(g, txt);
          c.eventMode = 'static';
          c.cursor = 'pointer';
          const hit = new Graphics();
          hit.rect(0, 0, width, height);
          hit.fill({ color: 0xffffff, alpha: 0.001 });
          c.addChild(hit);

          let hover = false;
          c.on('pointerover', () => {
            hover = true;
            g.clear();
            g.roundRect(0, 0, width, height, 8);
            g.fill({ color: fill + 0x101010, alpha: 1 });
            g.stroke({ width: 1, color: 0x58a6ff });
          });
          c.on('pointerout', () => {
            hover = false;
            g.clear();
            g.roundRect(0, 0, width, height, 8);
            g.fill({ color: fill, alpha: 1 });
            g.stroke({ width: 1, color: 0x30363d });
          });

          return c;
        }

        const btnW = (W - pad * 3) / 2;
        const btnH = 48;
        const btnY = H - 88;
        const btnReport = makeButton('Доложить наверх', pad, btnY, btnW, btnH, 0x238636);
        const btnCalm = makeButton(
          'Всё спокойно',
          pad * 2 + btnW,
          btnY,
          btnW,
          btnH,
          0x1f6feb,
        );

        monitorUi.addChild(
          title,
          gameClock,
          waitingText,
          signalPanel,
          decisionLabel,
          countdown,
          errorsText,
          btnReport,
          btnCalm,
        );

        /* Рамка под UI: если центр PNG непрозрачный, при порядке «рамка сверху»
           весь сигнал оказывается скрыт. Шум и текст — поверх рамки. */
        app.stage.addChild(bgSpr);
        app.stage.addChild(frameSpr);
        app.stage.addChild(monitorUi);
        app.stage.addChild(noiseSpr);
        app.stage.addChild(recvSpr);
        app.stage.addChild(radarSpr);

        let gameStart = performance.now();
        let gameEnd = gameStart + GAME_MS;
        let errors = 0;

        /** @type {ReturnType<typeof generateSignal>|null} */
        let currentSignal = null;
        /** @type {number|null} */
        let signalExpiresAt = null;
        /** @type {number|null} */
        let nextSignalAt = gameStart + betweenGapMs();

        let ended = false;

        const overlay = new Container();
        overlay.visible = false;
        const overlayBg = new Graphics();
        overlayBg.rect(0, 0, W, H);
        overlayBg.fill({ color: 0x000000, alpha: 0.75 });

        const overText = new Text({
          text: '',
          style: {
            fill: 0xe6edf3,
            fontFamily: 'Segoe UI, system-ui, sans-serif',
            fontSize: 32,
            fontWeight: '600',
            align: 'center',
          },
        });
        overText.anchor.set(0.5, 0.5);
        overText.x = W / 2;
        overText.y = H / 2;

        overlay.addChild(overlayBg, overText);
        app.stage.addChild(overlay);

        function finishGame() {
          ended = true;
          recvSpr.visible = false;
          currentSignal = null;
          signalExpiresAt = null;
          nextSignalAt = null;
          waitingText.visible = false;
          signalPanel.visible = false;
          btnReport.eventMode = 'none';
          btnCalm.eventMode = 'none';
          btnReport.alpha = 0.4;
          btnCalm.alpha = 0.4;
          overlay.visible = true;
          overText.text = `Игра окончена.\nОшибок: ${errors}`;
        }

        function applyErrorsText() {
          errorsText.text = `Ошибок: ${errors}`;
        }

        function refreshSignalDisplay(sig) {
          const lines = [
            `Символ: ${sig.symbol}`,
            `Бинарный код: ${sig.binary}`,
            `Частота: ${sig.freq}`,
            `Тип (на экране): ${sig.displayType}`,
          ];
          if (sig.isFake && sig.glitchNote) {
            lines.push(`Диагностика: ${sig.glitchNote}`);
          }
          lines.push('');
          for (let i = 0; i < signalLines.length; i++) {
            signalLines[i].text = lines[i] ?? '';
          }
        }

        function beginSignal() {
          currentSignal = generateSignal();
          signalExpiresAt = performance.now() + SIGNAL_WINDOW_MS;
          signalPanel.visible = true;
          waitingText.visible = false;
          refreshSignalDisplay(currentSignal);
        }

        function clearSignalPhase() {
          currentSignal = null;
          signalExpiresAt = null;
          signalPanel.visible = false;
          waitingText.visible = true;
          nextSignalAt = performance.now() + betweenGapMs();
        }

        function handleChoice(choice) {
          if (ended || !currentSignal) return;

          const r = resolveAction(currentSignal, choice);
          if (!r.ok) {
            errors += 1;
            applyErrorsText();
          }
          clearSignalPhase();
        }

        btnReport.on('pointerdown', () => handleChoice('report'));
        btnCalm.on('pointerdown', () => handleChoice('calm'));

        app.ticker.add(() => {
          if (ended) return;

          const now = performance.now();

          recvSpr.visible = !!currentSignal;
          if (recvSpr.visible) {
            recvSpr.alpha =
              0.42 + 0.58 * (0.5 + 0.5 * Math.sin(now * 0.0065));
          }

          const leftMs = Math.max(0, Math.ceil(gameEnd - now));
          const mm = Math.floor(leftMs / 60000);
          const ss = Math.floor((leftMs % 60000) / 1000);
          gameClock.text = `Игра: ${mm}:${String(ss).padStart(2, '0')}`;

          if (now >= gameEnd) {
            finishGame();
            return;
          }

          if (!currentSignal) {
            countdown.text = '';
            if (now >= nextSignalAt) beginSignal();
          } else {
            const left = Math.max(0, Math.ceil((signalExpiresAt - now) / 1000));
            countdown.text = `${left} с`;

            if (now >= signalExpiresAt) {
              if (!currentSignal.isFake) {
                errors += 1;
                applyErrorsText();
              }
              clearSignalPhase();
            }
          }
        });

        window.addEventListener('resize', () => {
          /* одноразовый размер canvas; полный resize можно добавить при необходимости */
        });
      }

      main().catch(console.error);
    </script>
  </body>
</html>
