<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arm Swinger</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a2e;
        overflow: hidden;
      }
      canvas {
        display: block;
      }

      /* ===== Debug Panel ===== */
      .debug {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.85);
        color: #ccc;
        font-family: monospace;
        font-size: 12px;
        padding: 12px;
        border-radius: 8px;
        z-index: 3;
        min-width: 280px;
        user-select: none;

        & h3 {
          color: #fff;
          margin: 10px 0 4px;
          font-size: 13px;

          &:first-child {
            margin-top: 0;
          }
        }

        & label {
          display: flex;
          align-items: center;
          gap: 6px;
          margin: 3px 0;

          & span:first-child {
            min-width: 70px;
          }
          & input[type='range'] {
            flex: 1;
          }
          & .val {
            min-width: 50px;
            text-align: right;
            color: #0f0;
          }
        }

        & button {
          margin-top: 8px;
          padding: 4px 10px;
          background: #333;
          color: #0f0;
          border: 1px solid #555;
          border-radius: 4px;
          font-family: monospace;
          font-size: 12px;
          cursor: pointer;
        }

        & pre {
          margin-top: 6px;
          padding: 6px;
          background: #111;
          border-radius: 4px;
          color: #0f0;
          font-size: 11px;
          white-space: pre;
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== Debug Panel ===== -->
    <div class="debug" id="$debug">
      <h3>Left Shoulder</h3>
      <label
        ><span>x</span
        ><input
          type="range"
          min="-500"
          max="500"
          value="-165"
          data-target="lsx"
        /><span class="val">-165</span></label
      >
      <label
        ><span>y</span
        ><input
          type="range"
          min="-500"
          max="0"
          value="-390"
          data-target="lsy"
        /><span class="val">-390</span></label
      >

      <h3>Right Shoulder</h3>
      <label
        ><span>x</span
        ><input
          type="range"
          min="-500"
          max="500"
          value="165"
          data-target="rsx"
        /><span class="val">165</span></label
      >
      <label
        ><span>y</span
        ><input
          type="range"
          min="-500"
          max="0"
          value="-390"
          data-target="rsy"
        /><span class="val">-390</span></label
      >

      <h3>Left Arm Anchor</h3>
      <label
        ><span>x</span
        ><input
          type="range"
          min="0"
          max="100"
          value="85"
          data-target="lax"
        /><span class="val">0.85</span></label
      >
      <label
        ><span>y</span
        ><input
          type="range"
          min="0"
          max="100"
          value="93"
          data-target="lay"
        /><span class="val">0.93</span></label
      >

      <h3>Right Arm Anchor</h3>
      <label
        ><span>x</span
        ><input
          type="range"
          min="0"
          max="100"
          value="15"
          data-target="rax"
        /><span class="val">0.15</span></label
      >
      <label
        ><span>y</span
        ><input
          type="range"
          min="0"
          max="100"
          value="93"
          data-target="ray"
        /><span class="val">0.93</span></label
      >

      <button id="$btnCopy">Copy values</button>
      <pre id="$debugOutput"></pre>

      <h3>Warship</h3>
      <label
        ><span>x</span
        ><input
          type="range"
          min="-500"
          max="500"
          value="0"
          data-target="wx"
        /><span class="val">0</span></label
      >
      <label
        ><span>y</span
        ><input
          type="range"
          min="-500"
          max="500"
          value="0"
          data-target="wy"
        /><span class="val">0</span></label
      >
      <label
        ><span>anchor x</span
        ><input
          type="range"
          min="0"
          max="100"
          value="50"
          data-target="wax"
        /><span class="val">0.50</span></label
      >
      <label
        ><span>anchor y</span
        ><input
          type="range"
          min="0"
          max="100"
          value="100"
          data-target="way"
        /><span class="val">1.00</span></label
      >
      <label
        ><span>scale</span
        ><input
          type="range"
          min="10"
          max="200"
          value="100"
          data-target="ws"
        /><span class="val">1.00</span></label
      >

      <h3>Background</h3>
      <label
        ><span>x</span
        ><input
          type="range"
          min="-500"
          max="500"
          value="0"
          data-target="bgx"
        /><span class="val">0</span></label
      >
      <label
        ><span>y</span
        ><input
          type="range"
          min="-500"
          max="500"
          value="0"
          data-target="bgy"
        /><span class="val">0</span></label
      >
      <label
        ><span>scale</span
        ><input
          type="range"
          min="10"
          max="300"
          value="100"
          data-target="bgs"
        /><span class="val">1.00</span></label
      >
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.9.2/dist/pixi.min.js"></script>
    <script>
      // ===== Config =====
      const ARM_SPEED = 0.06; // radians per frame
      const ARM_MIN = -Math.PI;
      const ARM_MAX = Math.PI;
      const SCALE = 0.4;

      // ===== State =====
      let leftAngle = 0;
      let rightAngle = 0;

      const keys = { a: false, d: false, j: false, l: false };

      // ===== Sprite dimensions (for anchor math) =====
      // body.png: 889 x 475
      // arm-left.png: 393 x 365 — pivot at bottom-right (shoulder)
      // arm-right.png: 419 x 361 — pivot at bottom-left (shoulder)

      // Shoulder offsets from body anchor (body anchor = bottom-center)
      const SHOULDERS = {
        left: { x: -100, y: -197 },
        right: { x: 100, y: -197 },
      };

      // ===== Debug anchor defaults =====
      const ANCHORS = {
        left: { x: 0.95, y: 0.58 },
        right: { x: 0.06, y: 0.58 },
      };

      let app;
      let armLeft, armRight;
      let dotLeftShoulder, dotRightShoulder, dotLeftAnchor, dotRightAnchor;
      let warship;
      const WARSHIP = {
        offsetX: -23,
        offsetY: 260,
        anchorX: 0.5,
        anchorY: 0.9,
        scale: 1.4,
      };

      const BG = { offsetX: 0, offsetY: -100, scale: 1 };
      let bg;

      // ===== Aircraft =====
      let aircraft;
      const AIRCRAFT = {
        duration: 4, // seconds for full approach
        startX: 0.5, // relative to screen width
        startY: 0.25,
        startScale: 0.05,
        endX: 0.48, // landing point relative to screen
        endY: 0.72,
        endScale: 0.35,
      };
      let aircraftT = 0;
      let aircraftLanded = false;

      // ===== Init =====
      async function init() {
        app = new PIXI.Application();
        await app.init({
          resizeTo: window,
          background: 0x1a1a2e,
          antialias: true,
        });
        document.body.appendChild(app.canvas);

        await PIXI.Assets.load([
          'sprites/bg.png',
          'sprites/warship.png',
          'sprites/aircraft.png',
          'sprites/body.png',
          'sprites/arm-left.png',
          'sprites/arm-right.png',
        ]);

        // ===== Background =====
        bg = PIXI.Sprite.from('sprites/bg.png');
        bg.anchor.set(0.5, 0.5);
        bg.x = app.screen.width / 2 + BG.offsetX;
        bg.y = app.screen.height / 2 + BG.offsetY;
        const bgScaleX = app.screen.width / bg.texture.width;
        const bgScaleY = app.screen.height / bg.texture.height;
        bg.scale.set(Math.max(bgScaleX, bgScaleY) * BG.scale);
        app.stage.addChild(bg);

        // ===== Warship =====
        warship = PIXI.Sprite.from('sprites/warship.png');
        warship.anchor.set(WARSHIP.anchorX, WARSHIP.anchorY);
        warship.x = app.screen.width / 2 + WARSHIP.offsetX;
        warship.y = app.screen.height + WARSHIP.offsetY;
        app.stage.addChild(warship);

        // Scale warship to fill screen width
        const shipBaseScale = app.screen.width / warship.texture.width;
        warship.scale.set(shipBaseScale * WARSHIP.scale);

        // ===== Aircraft =====
        aircraft = PIXI.Sprite.from('sprites/aircraft.png');
        aircraft.anchor.set(0.5, 0.5);
        aircraft.x = app.screen.width * AIRCRAFT.startX;
        aircraft.y = app.screen.height * AIRCRAFT.startY;
        aircraft.scale.set(AIRCRAFT.startScale);
        app.stage.addChild(aircraft);

        // ===== Resize handler ref =====
        const resizeWarship = () => {
          warship.x = app.screen.width / 2 + WARSHIP.offsetX;
          warship.y = app.screen.height + WARSHIP.offsetY;
          const s = app.screen.width / warship.texture.width;
          warship.scale.set(s * WARSHIP.scale);
        };

        const character = new PIXI.Container();
        character.x = app.screen.width / 2;
        character.y = app.screen.height;
        character.scale.set(SCALE);
        app.stage.addChild(character);

        // ===== Left arm =====
        armLeft = PIXI.Sprite.from('sprites/arm-left.png');
        armLeft.anchor.set(ANCHORS.left.x, ANCHORS.left.y);
        armLeft.x = SHOULDERS.left.x;
        armLeft.y = SHOULDERS.left.y;
        character.addChild(armLeft);

        // ===== Right arm =====
        armRight = PIXI.Sprite.from('sprites/arm-right.png');
        armRight.anchor.set(ANCHORS.right.x, ANCHORS.right.y);
        armRight.x = SHOULDERS.right.x;
        armRight.y = SHOULDERS.right.y;
        character.addChild(armRight);

        // ===== Body (on top of arms) =====
        const body = PIXI.Sprite.from('sprites/body.png');
        body.anchor.set(0.5, 1);
        body.x = 0;
        body.y = 0;
        character.addChild(body);

        // ===== Debug dots =====
        dotLeftShoulder = new PIXI.Graphics().circle(0, 0, 8).fill(0x00ff00);
        dotRightShoulder = new PIXI.Graphics().circle(0, 0, 8).fill(0x00ff00);
        dotLeftAnchor = new PIXI.Graphics().circle(0, 0, 6).fill(0xff0000);
        dotRightAnchor = new PIXI.Graphics().circle(0, 0, 6).fill(0xff0000);

        dotLeftShoulder.x = SHOULDERS.left.x;
        dotLeftShoulder.y = SHOULDERS.left.y;
        dotRightShoulder.x = SHOULDERS.right.x;
        dotRightShoulder.y = SHOULDERS.right.y;

        character.addChild(dotLeftShoulder);
        character.addChild(dotRightShoulder);
        character.addChild(dotLeftAnchor);
        character.addChild(dotRightAnchor);

        // ===== Controls hint =====
        const hintStyle = new PIXI.TextStyle({
          fontFamily: 'monospace',
          fontSize: 16,
          fill: '#eeeeee',
          align: 'center',
        });
        const hint = new PIXI.Text({
          text: 'Left arm: [A] / [D]    Right arm: [J] / [L]',
          style: hintStyle,
        });
        hint.anchor.set(0.5, 0);
        hint.x = app.screen.width / 2;
        hint.y = 20;
        hint.alpha = 0.7;
        app.stage.addChild(hint);

        bindEvents();
        initDebug();
        app.ticker.add(update);

        // ===== Resize =====
        window.addEventListener('resize', () => {
          character.x = app.screen.width / 2;
          character.y = app.screen.height;
          hint.x = app.screen.width / 2;
          resizeWarship();
          bg.x = app.screen.width / 2 + BG.offsetX;
          bg.y = app.screen.height / 2 + BG.offsetY;
          const bsx = app.screen.width / bg.texture.width;
          const bsy = app.screen.height / bg.texture.height;
          bg.scale.set(Math.max(bsx, bsy) * BG.scale);
        });
      }

      // ===== Events =====
      function bindEvents() {
        document.addEventListener('keydown', (e) => {
          const k = e.key.toLowerCase();
          if (k in keys) keys[k] = true;
        });

        document.addEventListener('keyup', (e) => {
          const k = e.key.toLowerCase();
          if (k in keys) keys[k] = false;
        });
      }

      // ===== Game Loop =====
      let time = 0;
      function update() {
        // Left arm: A rotates counter-clockwise, D rotates clockwise
        if (keys.a) leftAngle -= ARM_SPEED;
        if (keys.d) leftAngle += ARM_SPEED;

        // Right arm: J rotates counter-clockwise, L rotates clockwise
        if (keys.j) rightAngle -= ARM_SPEED;
        if (keys.l) rightAngle += ARM_SPEED;

        // Clamp
        leftAngle = Math.max(ARM_MIN, Math.min(ARM_MAX, leftAngle));
        rightAngle = Math.max(ARM_MIN, Math.min(ARM_MAX, rightAngle));

        // Apply rotation
        armLeft.rotation = leftAngle;
        armRight.rotation = rightAngle;

        // ===== Warship wave rocking =====
        time += 0.016;
        warship.rotation = Math.sin(time * 0.8) * 0.008;
        warship.y =
          app.screen.height + WARSHIP.offsetY + Math.sin(time * 1.2) * 3;

        // ===== Aircraft approach =====
        if (!aircraftLanded) {
          aircraftT += 0.016 / AIRCRAFT.duration;
          if (aircraftT >= 1) {
            aircraftT = 1;
            aircraftLanded = true;
          }
          // Ease-out cubic for smooth deceleration
          const t = 1 - Math.pow(1 - aircraftT, 3);
          const sx = app.screen.width * AIRCRAFT.startX;
          const sy = app.screen.height * AIRCRAFT.startY;
          const ex = app.screen.width * AIRCRAFT.endX;
          const ey = app.screen.height * AIRCRAFT.endY;
          aircraft.x = sx + (ex - sx) * t;
          aircraft.y = sy + (ey - sy) * t;
          aircraft.scale.set(AIRCRAFT.startScale + (AIRCRAFT.endScale - AIRCRAFT.startScale) * t);
        }

        // Update debug dots — shoulders (green, at pivot)
        dotLeftShoulder.x = SHOULDERS.left.x;
        dotLeftShoulder.y = SHOULDERS.left.y;
        dotRightShoulder.x = SHOULDERS.right.x;
        dotRightShoulder.y = SHOULDERS.right.y;

        // Anchor dots (red) — show the far tip of each arm sprite
        // Tip of left arm is at sprite-local (0, 0) relative to anchor
        const lTipX = -ANCHORS.left.x * armLeft.texture.width;
        const lTipY = -ANCHORS.left.y * armLeft.texture.height;
        dotLeftAnchor.x =
          SHOULDERS.left.x +
          lTipX * Math.cos(leftAngle) -
          lTipY * Math.sin(leftAngle);
        dotLeftAnchor.y =
          SHOULDERS.left.y +
          lTipX * Math.sin(leftAngle) +
          lTipY * Math.cos(leftAngle);

        const rTipX = (1 - ANCHORS.right.x) * armRight.texture.width;
        const rTipY = -ANCHORS.right.y * armRight.texture.height;
        dotRightAnchor.x =
          SHOULDERS.right.x +
          rTipX * Math.cos(rightAngle) -
          rTipY * Math.sin(rightAngle);
        dotRightAnchor.y =
          SHOULDERS.right.y +
          rTipX * Math.sin(rightAngle) +
          rTipY * Math.cos(rightAngle);
      }

      // ===== Debug =====
      function initDebug() {
        $debug.addEventListener('input', (e) => {
          const input = e.target;
          if (input.tagName !== 'INPUT') return;
          const t = input.dataset.target;
          const v = Number(input.value);
          const $val = input.parentElement.querySelector('.val');

          switch (t) {
            case 'lsx':
              SHOULDERS.left.x = v;
              armLeft.x = v;
              $val.textContent = v;
              break;
            case 'lsy':
              SHOULDERS.left.y = v;
              armLeft.y = v;
              $val.textContent = v;
              break;
            case 'rsx':
              SHOULDERS.right.x = v;
              armRight.x = v;
              $val.textContent = v;
              break;
            case 'rsy':
              SHOULDERS.right.y = v;
              armRight.y = v;
              $val.textContent = v;
              break;
            case 'lax':
              ANCHORS.left.x = v / 100;
              armLeft.anchor.x = ANCHORS.left.x;
              $val.textContent = ANCHORS.left.x.toFixed(2);
              break;
            case 'lay':
              ANCHORS.left.y = v / 100;
              armLeft.anchor.y = ANCHORS.left.y;
              $val.textContent = ANCHORS.left.y.toFixed(2);
              break;
            case 'rax':
              ANCHORS.right.x = v / 100;
              armRight.anchor.x = ANCHORS.right.x;
              $val.textContent = ANCHORS.right.x.toFixed(2);
              break;
            case 'ray':
              ANCHORS.right.y = v / 100;
              armRight.anchor.y = ANCHORS.right.y;
              $val.textContent = ANCHORS.right.y.toFixed(2);
              break;
            case 'wx':
              WARSHIP.offsetX = v;
              warship.x = app.screen.width / 2 + v;
              $val.textContent = v;
              break;
            case 'wy':
              WARSHIP.offsetY = v;
              warship.y = app.screen.height + v;
              $val.textContent = v;
              break;
            case 'wax':
              WARSHIP.anchorX = v / 100;
              warship.anchor.x = WARSHIP.anchorX;
              $val.textContent = WARSHIP.anchorX.toFixed(2);
              break;
            case 'way':
              WARSHIP.anchorY = v / 100;
              warship.anchor.y = WARSHIP.anchorY;
              $val.textContent = WARSHIP.anchorY.toFixed(2);
              break;
            case 'ws':
              WARSHIP.scale = v / 100;
              {
                const s = app.screen.width / warship.texture.width;
                warship.scale.set(s * WARSHIP.scale);
              }
              $val.textContent = WARSHIP.scale.toFixed(2);
              break;
            case 'bgx':
              BG.offsetX = v;
              bg.x = app.screen.width / 2 + v;
              $val.textContent = v;
              break;
            case 'bgy':
              BG.offsetY = v;
              bg.y = app.screen.height / 2 + v;
              $val.textContent = v;
              break;
            case 'bgs':
              BG.scale = v / 100;
              {
                const bsx = app.screen.width / bg.texture.width;
                const bsy = app.screen.height / bg.texture.height;
                bg.scale.set(Math.max(bsx, bsy) * BG.scale);
              }
              $val.textContent = BG.scale.toFixed(2);
              break;
          }
        });

        // Prevent keyboard controls while adjusting sliders
        $debug.addEventListener('keydown', (e) => e.stopPropagation());
        $debug.addEventListener('keyup', (e) => e.stopPropagation());

        $btnCopy.addEventListener('click', () => {
          const code = [
            `SHOULDERS.left = { x: ${SHOULDERS.left.x}, y: ${SHOULDERS.left.y} }`,
            `SHOULDERS.right = { x: ${SHOULDERS.right.x}, y: ${SHOULDERS.right.y} }`,
            `ANCHORS.left = { x: ${ANCHORS.left.x.toFixed(2)}, y: ${ANCHORS.left.y.toFixed(2)} }`,
            `ANCHORS.right = { x: ${ANCHORS.right.x.toFixed(2)}, y: ${ANCHORS.right.y.toFixed(2)} }`,
            `warship: offset(${WARSHIP.offsetX}, ${WARSHIP.offsetY}) anchor(${WARSHIP.anchorX.toFixed(2)}, ${WARSHIP.anchorY.toFixed(2)}) scale(${WARSHIP.scale.toFixed(2)})`,
            `BG: offset(${BG.offsetX}, ${BG.offsetY}) scale(${BG.scale.toFixed(2)})`,
          ].join('\n');
          $debugOutput.textContent = code;
          $debugOutput.style.display = 'block';
          navigator.clipboard.writeText(code);
        });
      }

      init();
    </script>
  </body>
</html>
